<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bangladesh Apparel Passport — Beyond the Stitch</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500;600&family=Noto+Sans+Bengali:wght@500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
:root{
  --navy:#070B26;
  --indigo:#11183A;
  --blue:#4F7BFF;
  --violet:#785BFF;
  --cyan:#6EEBFF;
  --white:#FFFFFF;
  --grey:#C7CFDD;
  --border:rgba(111,143,255,0.18);
  --card:rgba(17,24,58,0.6);
  --font-display:'Space Grotesk',sans-serif;
  --font-body:'Inter',sans-serif;
  --font-mono:'JetBrains Mono',monospace;
  --font-bn:'Noto Sans Bengali',sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{
  background:var(--navy);
  color:var(--white);
  font-family:var(--font-body);
  height:100vh;
  overflow:hidden;
  -webkit-font-smoothing:antialiased;
}
@media (prefers-reduced-motion: reduce){
  *{animation-duration:.001ms !important;animation-iteration-count:1 !important;transition-duration:.001ms !important;}
}
::selection{background:var(--blue);color:var(--white);}
button{font-family:inherit;}

/* ---------- ambient background ---------- */
.glow-field{position:fixed;inset:0;z-index:0;pointer-events:none;overflow:hidden;}
.glow{position:absolute;border-radius:50%;filter:blur(120px);opacity:.32;}
.glow.g1{width:600px;height:600px;background:var(--blue);top:-15%;left:-10%;}
.glow.g2{width:500px;height:500px;background:var(--violet);bottom:-10%;right:-8%;}
.glow.g3{width:420px;height:420px;background:var(--cyan);top:35%;left:60%;opacity:.14;}

/* ---------- running header (minimal, non-competing) ---------- */
.runner{
  position:fixed;top:0;left:0;right:0;z-index:50;
  display:flex;align-items:center;justify-content:space-between;
  padding:1.1rem 1.6rem;pointer-events:none;
}
.runner .mark{
  font-family:var(--font-mono);font-size:.66rem;letter-spacing:.14em;color:var(--grey);
  display:flex;align-items:center;gap:.5rem;opacity:.75;
}
.runner .mark .dot{width:6px;height:6px;border-radius:50%;background:var(--cyan);box-shadow:0 0 8px var(--cyan);}
.runner .to-cover{
  pointer-events:all;font-family:var(--font-mono);font-size:.66rem;letter-spacing:.08em;
  color:var(--grey);background:rgba(255,255,255,.04);border:1px solid var(--border);
  padding:.45rem .9rem;border-radius:999px;cursor:pointer;opacity:0;transform:translateY(-6px);
  transition:all .3s ease;
}
.runner .to-cover.show{opacity:1;transform:translateY(0);pointer-events:all;}
.runner .to-cover:hover{border-color:var(--cyan);color:var(--cyan);}

/* ---------- stage ---------- */
.stage{
  position:relative;z-index:1;height:100vh;
  display:flex;align-items:center;justify-content:center;
  padding:2rem 1.2rem;
}

/* ==================== COVER ==================== */
.cover-wrap{
  display:flex;flex-direction:column;align-items:center;
  transition:opacity .6s ease, transform .6s ease;
}
.cover-wrap.hidden{opacity:0;transform:scale(.92);pointer-events:none;position:absolute;}

.cover-card{
  width:min(400px,86vw);
  aspect-ratio:3/4.3;
  border-radius:22px;
  background:
    radial-gradient(120% 90% at 20% 0%, rgba(120,91,255,.35), transparent 55%),
    radial-gradient(120% 90% at 90% 100%, rgba(79,123,255,.35), transparent 55%),
    linear-gradient(160deg,var(--indigo),var(--navy) 65%);
  border:1px solid rgba(255,255,255,.12);
  box-shadow:0 40px 110px rgba(0,0,0,.55), 0 0 90px rgba(79,123,255,.18);
  position:relative;overflow:hidden;cursor:pointer;
  display:flex;flex-direction:column;align-items:center;justify-content:space-between;
  padding:2.4rem 1.8rem 1.8rem;
  isolation:isolate;
}
.cover-card::before{
  content:'';position:absolute;inset:0;
  background:linear-gradient(115deg, transparent 30%, rgba(255,255,255,.14) 48%, transparent 66%);
  background-size:250% 250%;
  animation:foil 6s ease-in-out infinite;
  mix-blend-mode:overlay;pointer-events:none;
}
@keyframes foil{0%{background-position:0% 0%;}50%{background-position:100% 100%;}100%{background-position:0% 0%;}}
.cover-card:hover{transform:translateY(-4px);box-shadow:0 50px 130px rgba(0,0,0,.6), 0 0 110px rgba(79,123,255,.28);}
.cover-frame{
  position:absolute;inset:10px;border:1px solid rgba(255,255,255,.14);border-radius:16px;pointer-events:none;
}
.cover-emblem{margin-top:.6rem;position:relative;}
.cover-emblem svg{width:92px;height:92px;}
.flag{font-size:2rem;position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);}
.cover-country{
  font-family:var(--font-mono);font-size:.85rem;letter-spacing:.65em;margin-left:.65em;
  color:var(--cyan);text-shadow:0 0 20px rgba(110,235,255,.55);margin-top:1.6rem;
}
.cover-title{
  font-family:var(--font-display);font-weight:700;font-size:clamp(1.7rem,7vw,2.3rem);
  letter-spacing:-.02em;text-align:center;line-height:1.08;margin-top:.6rem;
  background:linear-gradient(100deg,#fff 15%, var(--cyan) 45%, var(--violet) 70%, #fff 90%);
  background-size:250% 100%;-webkit-background-clip:text;background-clip:text;color:transparent;
  animation:shine 7s linear infinite;
}
@keyframes shine{0%{background-position:0% 50%;}100%{background-position:250% 50%;}}
.cover-sub{
  font-family:var(--font-mono);font-size:.7rem;letter-spacing:.1em;color:var(--grey);
  text-align:center;margin-top:.7rem;font-style:italic;
}
.cover-mrz{
  font-family:var(--font-mono);font-size:.56rem;letter-spacing:.06em;color:rgba(199,207,221,.4);
  text-align:center;line-height:1.5;margin-top:1.4rem;user-select:none;
}
.open-btn{
  margin-top:1.6rem;font-family:var(--font-mono);font-size:.78rem;letter-spacing:.05em;
  padding:.95rem 2.1rem;border-radius:999px;border:none;cursor:pointer;
  background:linear-gradient(120deg,var(--blue),var(--violet));color:#fff;
  box-shadow:0 10px 34px rgba(79,123,255,.4);
  transition:transform .25s ease, box-shadow .25s ease;
}
.open-btn:hover{transform:translateY(-2px);box-shadow:0 16px 44px rgba(79,123,255,.55);}
.cover-tap{font-family:var(--font-mono);font-size:.6rem;letter-spacing:.14em;color:var(--grey);opacity:.6;margin-top:.7rem;}

/* ==================== BOOK ==================== */
.book-wrap{
  display:flex;align-items:stretch;gap:0;
  opacity:0;transform:scale(.94);pointer-events:none;position:absolute;
  transition:opacity .6s ease .1s, transform .6s ease .1s;
}
.book-wrap.show{opacity:1;transform:scale(1);pointer-events:all;position:relative;}

.tabs{display:flex;flex-direction:column;gap:.55rem;padding-top:2.6rem;}
.tab{
  font-family:var(--font-mono);font-size:.62rem;letter-spacing:.04em;
  display:flex;align-items:center;gap:.5rem;
  padding:.6rem .8rem .6rem .7rem;border-radius:8px 0 0 8px;cursor:pointer;
  color:var(--grey);background:rgba(255,255,255,.02);border:1px solid var(--border);border-right:none;
  transition:all .25s ease;white-space:nowrap;transform:translateX(0);
}
.tab .ic{font-size:.85rem;}
.tab:hover{color:var(--white);background:rgba(255,255,255,.05);}
.tab.active{
  color:var(--navy);background:linear-gradient(120deg,var(--cyan),var(--blue));
  transform:translateX(8px);box-shadow:-6px 0 24px rgba(79,123,255,.35);
  border-color:transparent;font-weight:600;
}

.book{
  width:min(480px,88vw);height:min(660px,80vh);
  background:
    radial-gradient(140% 100% at 0% 0%, rgba(120,91,255,.16), transparent 55%),
    linear-gradient(160deg,var(--indigo),var(--navy) 70%);
  border:1px solid var(--border);border-radius:18px;
  box-shadow:0 40px 110px rgba(0,0,0,.5);
  position:relative;overflow:hidden;
  display:flex;flex-direction:column;
  perspective:1800px;
}
.page-head{
  display:flex;align-items:center;justify-content:space-between;
  padding:1.5rem 1.8rem 1rem;border-bottom:1px dashed var(--border);flex-shrink:0;
}
.page-head .pe{font-family:var(--font-mono);font-size:.66rem;color:var(--cyan);letter-spacing:.1em;}
.page-head h2{font-family:var(--font-display);font-size:1.35rem;margin-top:.25rem;letter-spacing:-.01em;}
.page-count{font-family:var(--font-mono);font-size:.66rem;color:var(--grey);}

.page-body{
  flex:1;overflow-y:auto;padding:1.6rem 1.8rem 1.4rem;
  transform-origin:left center;
  transition:transform .32s cubic-bezier(.4,0,.2,1), opacity .32s ease;
}
.page-body.flip-out{transform:rotateY(-12deg) translateX(-10px);opacity:0;}
.page-body.flip-in{transform:rotateY(0) translateX(0);opacity:1;}
.page-body::-webkit-scrollbar{width:5px;}
.page-body::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px;}

.page-foot{
  display:flex;align-items:center;justify-content:space-between;
  padding:1rem 1.8rem;border-top:1px dashed var(--border);flex-shrink:0;
}
.nav-btn{
  font-family:var(--font-mono);font-size:.7rem;color:var(--grey);background:none;border:1px solid var(--border);
  padding:.5rem .9rem;border-radius:999px;cursor:pointer;transition:all .2s ease;
}
.nav-btn:hover{border-color:var(--cyan);color:var(--cyan);}
.nav-btn:disabled{opacity:.3;cursor:default;}
.dots{display:flex;gap:5px;}
.dots span{width:5px;height:5px;border-radius:50%;background:rgba(199,207,221,.3);}
.dots span.on{background:var(--cyan);box-shadow:0 0 6px var(--cyan);}

/* ---------- generic page content styles ---------- */
.p-eyebrow{font-family:var(--font-mono);font-size:.62rem;color:var(--cyan);letter-spacing:.14em;text-transform:uppercase;}
.p-lead{margin-top:.5rem;font-size:.86rem;color:var(--grey);line-height:1.6;}
.row{display:flex;justify-content:space-between;padding:.55rem 0;border-bottom:1px solid var(--border);font-size:.82rem;gap:1rem;}
.row span:first-child{color:var(--grey);}
.row span:last-child{text-align:right;font-weight:500;}

/* passport details page */
.bio-top{display:flex;gap:1.1rem;align-items:center;margin-bottom:1.2rem;}
.bio-photo{width:74px;height:74px;border-radius:10px;object-fit:cover;border:1px solid var(--border);}
.bio-id{font-family:var(--font-mono);font-size:.68rem;color:var(--cyan);}
.bio-status{
  display:inline-block;margin-top:.4rem;font-family:var(--font-mono);font-size:.6rem;
  padding:.28rem .6rem;border-radius:999px;border:1px solid var(--cyan);color:var(--cyan);
}
.mrz{
  margin-top:1.3rem;font-family:var(--font-mono);font-size:.62rem;letter-spacing:.03em;
  background:rgba(255,255,255,.03);border:1px solid var(--border);border-radius:8px;padding:.8rem .9rem;
  color:var(--grey);line-height:1.7;word-break:break-all;
}

/* journey / visa stamps */
.stamp-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:.8rem;}
.visa-stamp{
  border:1px dashed var(--border);border-radius:14px;padding:.9rem;cursor:pointer;
  transition:all .25s ease;text-align:center;
}
.visa-stamp:hover, .visa-stamp.open{border-color:var(--cyan);background:rgba(110,235,255,.04);}
.visa-stamp .num{font-family:var(--font-mono);font-size:.62rem;color:var(--cyan);}
.visa-stamp .lbl{font-family:var(--font-display);font-size:.9rem;margin-top:.3rem;}
.visa-stamp .det{max-height:0;overflow:hidden;opacity:0;transition:all .3s ease;font-size:.72rem;color:var(--grey);margin-top:.4rem;}
.visa-stamp.open .det{max-height:80px;opacity:1;}

/* factory */
.fact-imgs{display:grid;grid-template-columns:1fr 1fr;gap:.5rem;margin-bottom:1rem;}
.fact-imgs img{width:100%;height:90px;object-fit:cover;border-radius:8px;border:1px solid var(--border);}
.fact-imgs img:first-child{grid-column:1/3;height:130px;}
.cert-row{display:flex;flex-wrap:wrap;gap:.5rem;margin-top:1rem;}
.cert-chip{
  font-family:var(--font-mono);font-size:.6rem;padding:.4rem .7rem;border-radius:999px;
  border:1px dashed var(--border);color:var(--grey);cursor:default;
}

/* makers */
.maker-item{display:flex;gap:.9rem;padding:.9rem 0;border-bottom:1px solid var(--border);}
.maker-item img{width:46px;height:46px;border-radius:50%;object-fit:cover;flex-shrink:0;}
.maker-item h4{font-size:.9rem;}
.maker-item .role{font-family:var(--font-mono);font-size:.62rem;color:var(--cyan);margin-top:.1rem;}
.maker-item .quote{font-size:.76rem;color:var(--grey);font-style:italic;margin-top:.35rem;}
.bn{font-family:var(--font-bn);}

/* trust dashboard */
.metric{margin-bottom:1rem;}
.metric-top{display:flex;justify-content:space-between;font-size:.78rem;margin-bottom:.4rem;}
.metric-top .n{font-family:var(--font-mono);color:var(--cyan);}
.metric-bar{height:4px;border-radius:2px;background:rgba(255,255,255,.06);overflow:hidden;}
.metric-bar .fill{height:100%;width:0;background:linear-gradient(90deg,var(--blue),var(--cyan));transition:width 1.1s cubic-bezier(.16,.8,.24,1);}

/* impact */
.impact-item{
  display:flex;align-items:baseline;gap:.8rem;padding:1rem;border:1px solid var(--border);
  border-radius:12px;margin-bottom:.8rem;background:rgba(255,255,255,.02);
}
.impact-item .big{font-family:var(--font-display);font-size:1.6rem;font-weight:700;color:var(--cyan);}
.impact-item .sub{font-size:.78rem;color:var(--grey);}

/* connect */
.connect-btns{display:flex;flex-direction:column;gap:.6rem;margin-top:1.3rem;}
.cbtn{
  font-family:var(--font-mono);font-size:.74rem;letter-spacing:.02em;padding:.8rem 1rem;border-radius:10px;
  border:1px solid var(--border);color:var(--white);background:rgba(255,255,255,.02);cursor:pointer;
  text-align:left;transition:all .2s ease;display:flex;justify-content:space-between;align-items:center;
}
.cbtn:hover{border-color:var(--blue);background:rgba(79,123,255,.08);}
.cbtn.primary{background:linear-gradient(120deg,var(--blue),var(--violet));border:none;}

/* sub-page overlay (forms) */
.sub-overlay{
  position:absolute;inset:0;border-radius:18px;z-index:30;
  background:linear-gradient(160deg,var(--indigo),var(--navy) 70%);
  display:flex;flex-direction:column;
  transform:translateX(100%);transition:transform .4s cubic-bezier(.4,0,.2,1);
}
.sub-overlay.open{transform:translateX(0);}
.sub-head{display:flex;align-items:center;justify-content:space-between;padding:1.5rem 1.8rem 1rem;border-bottom:1px dashed var(--border);flex-shrink:0;}
.sub-head h3{font-family:var(--font-display);font-size:1.2rem;letter-spacing:-.01em;}
.sub-close{background:none;border:1px solid var(--border);color:var(--grey);width:32px;height:32px;border-radius:50%;cursor:pointer;flex-shrink:0;transition:all .2s ease;}
.sub-close:hover{border-color:var(--cyan);color:var(--cyan);}
.sub-content{flex:1;display:flex;flex-direction:column;overflow-y:auto;}
.sub-body{padding:1.4rem 1.8rem;flex:1;}
.sub-foot{padding:1rem 1.8rem 1.4rem;flex-shrink:0;}

.field{margin-bottom:1rem;}
.field label{display:block;font-family:var(--font-mono);font-size:.6rem;color:var(--grey);letter-spacing:.07em;text-transform:uppercase;margin-bottom:.4rem;}
.field input, .field textarea{
  width:100%;background:rgba(255,255,255,.03);border:1px solid var(--border);border-radius:8px;
  padding:.65rem .8rem;color:#fff;font-family:var(--font-body);font-size:.85rem;
}
.field input:focus, .field textarea:focus{outline:none;border-color:var(--cyan);background:rgba(110,235,255,.04);}
.field textarea{resize:vertical;min-height:70px;font-family:var(--font-body);}
.field input::placeholder, .field textarea::placeholder{color:rgba(199,207,221,.4);}
.full-btn{width:100%;text-align:center;justify-content:center;}

.stamp-confirm{display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;height:100%;padding:2rem 1.5rem;}
.stamp-mark{
  width:118px;height:118px;border:3px solid var(--cyan);border-radius:50%;
  display:flex;align-items:center;justify-content:center;position:relative;
  transform:rotate(-8deg) scale(0);animation:stampIn .55s cubic-bezier(.34,1.56,.64,1) forwards;
  box-shadow:0 0 30px rgba(110,235,255,.3);
}
.stamp-mark::before{content:'';position:absolute;inset:7px;border:1px dashed rgba(110,235,255,.6);border-radius:50%;}
.stamp-mark span{font-family:var(--font-mono);font-weight:700;font-size:.72rem;color:var(--cyan);letter-spacing:.04em;line-height:1.35;padding:0 .4rem;}
@keyframes stampIn{0%{transform:rotate(-25deg) scale(2.2);opacity:0;}55%{opacity:1;}100%{transform:rotate(-8deg) scale(1);opacity:1;}}
.stamp-ref{font-family:var(--font-mono);font-size:.68rem;color:var(--grey);margin-top:1.5rem;letter-spacing:.04em;}
.stamp-msg{margin-top:.7rem;font-size:.85rem;color:var(--grey);max-width:30ch;line-height:1.5;}

.profile-check{display:flex;justify-content:space-between;padding:.6rem 0;border-bottom:1px solid var(--border);font-size:.82rem;}
.profile-check span:last-child{color:var(--cyan);}

@media (max-width:640px){
  .book-wrap{flex-direction:column;align-items:center;gap:.6rem;}
  .tabs{flex-direction:row;flex-wrap:wrap;justify-content:center;padding-top:0;order:2;}
  .tab{border-radius:999px;border-right:1px solid var(--border);padding:.45rem .7rem;}
  .tab.active{transform:none;box-shadow:0 6px 20px rgba(79,123,255,.35);}
  .book{order:1;height:min(520px,66vh);width:92vw;}
  .stamp-grid{grid-template-columns:1fr;}
}
</style>
</head>
<body>

<div class="glow-field">
  <div class="glow g1"></div>
  <div class="glow g2"></div>
  <div class="glow g3"></div>
</div>

<div class="runner">
  <div class="mark"><span class="dot"></span> BEYOND THE STITCH</div>
  <button class="to-cover" id="toCoverBtn" onclick="showCover()">← Cover</button>
</div>

<div class="stage">

  <!-- ============ COVER ============ -->
  <div class="cover-wrap" id="coverWrap">
    <div class="cover-card" id="coverCard" onclick="openPassport()">
      <div class="cover-frame"></div>
      <div class="cover-emblem">
        <svg viewBox="0 0 100 100">
          <circle cx="50" cy="50" r="46" fill="none" stroke="rgba(255,255,255,.18)" stroke-width="1"/>
          <circle cx="50" cy="50" r="38" fill="none" stroke="rgba(110,235,255,.5)" stroke-width="1" stroke-dasharray="2 4"/>
          <circle cx="50" cy="50" r="30" fill="none" stroke="rgba(255,255,255,.14)" stroke-width="1"/>
        </svg>
        <span class="flag">🇧🇩</span>
      </div>
      <div>
        <div class="cover-country">BANGLADESH</div>
        <div class="cover-title">Apparel<br>Passport</div>
        <div class="cover-sub">Verified through Beyond the Stitch</div>
      </div>
      <div style="display:flex;flex-direction:column;align-items:center;">
        <div class="cover-mrz">P&lt;BGDMERIDIAN&lt;KNITWEAR&lt;&lt;APPAREL&lt;PASSPORT&lt;&lt;&lt;&lt;&lt;&lt;&lt;&lt;&lt;<br>BD2026M0417&lt;8BGD2611115M3112318&lt;&lt;&lt;&lt;&lt;&lt;&lt;&lt;08</div>
        <button class="open-btn" onclick="event.stopPropagation();openPassport();">Open Passport</button>
        <div class="cover-tap">TAP ANYWHERE TO OPEN</div>
      </div>
    </div>
  </div>

  <!-- ============ BOOK ============ -->
  <div class="book-wrap" id="bookWrap">
    <div class="tabs" id="tabs"></div>
    <div class="book">
      <div class="page-head">
        <div>
          <div class="pe" id="pageEyebrow">PAGE 01 / 07</div>
          <h2 id="pageTitle">Passport Details</h2>
        </div>
        <div class="page-count" id="pageCount">01/07</div>
      </div>
      <div class="page-body" id="pageBody"></div>
      <div class="page-foot">
        <button class="nav-btn" id="prevBtn">← Prev</button>
        <div class="dots" id="dots"></div>
        <button class="nav-btn" id="nextBtn">Next →</button>
      </div>
      <div class="sub-overlay" id="subOverlay"></div>
    </div>
  </div>

</div>

<script>
/* ================= DATA ================= */
const journeySteps = [
  {label:'Raw Material', detail:'Certified organic cotton sourced and graded.'},
  {label:'Fabric', detail:'Knitted, dyed, and tested for colorfastness.'},
  {label:'Cutting', detail:'Precision-cut using automated markers.'},
  {label:'Sewing', detail:'Assembled by specialist operators.'},
  {label:'Quality Check', detail:'AQL 2.5 four-point inspection.'},
  {label:'Packing', detail:'Folded, tagged, cartoned for export.'},
  {label:'Export', detail:'Cleared and shipped from Chattogram port.'},
  {label:'Buyer', detail:'Arrives ready for shelf.'}
];

/* ================= STATE ================= */
let current = 0;
const tabsEl = document.getElementById('tabs');
const pageBody = document.getElementById('pageBody');
const pageTitle = document.getElementById('pageTitle');
const pageEyebrow = document.getElementById('pageEyebrow');
const pageCount = document.getElementById('pageCount');
const dotsEl = document.getElementById('dots');
const prevBtn = document.getElementById('prevBtn');
const nextBtn = document.getElementById('nextBtn');

pages.forEach((p,i)=>{
  const t = document.createElement('div');
  t.className='tab'+(i===0?' active':'');
  t.innerHTML = `<span class="ic">${p.icon}</span> ${p.tab}`;
  t.addEventListener('click',()=>goTo(i));
  tabsEl.appendChild(t);
});
pages.forEach((_,i)=>{
  const d = document.createElement('span');
  if(i===0) d.classList.add('on');
  dotsEl.appendChild(d);
});

function renderPage(i){
  const p = pages[i];
  pageEyebrow.textContent = `PAGE ${String(i+1).padStart(2,'0')} / ${String(pages.length).padStart(2,'0')}`;
  pageTitle.textContent = p.title;
  pageCount.textContent = `${String(i+1).padStart(2,'0')}/${String(pages.length).padStart(2,'0')}`;
  pageBody.innerHTML = p.render();
  tabsEl.querySelectorAll('.tab').forEach((t,idx)=>t.classList.toggle('active', idx===i));
  dotsEl.querySelectorAll('span').forEach((d,idx)=>d.classList.toggle('on', idx===i));
  prevBtn.disabled = i===0;
  nextBtn.disabled = i===pages.length-1;
  if(p.key==='trust'){
    requestAnimationFrame(()=>{
      pageBody.querySelectorAll('.fill').forEach(f=>{ f.style.width = f.dataset.w+'%'; });
    });
  }
}
function goTo(i){
  if(i<0||i>=pages.length||i===current) return;
  pageBody.classList.add('flip-out');
  setTimeout(()=>{
    current = i;
    renderPage(current);
    pageBody.classList.remove('flip-out');
    pageBody.classList.add('flip-in');
    setTimeout(()=>pageBody.classList.remove('flip-in'),320);
  },220);
}
prevBtn.addEventListener('click',()=>goTo(current-1));
nextBtn.addEventListener('click',()=>goTo(current+1));
document.addEventListener('keydown',(e)=>{
  if(!document.getElementById('bookWrap').classList.contains('show')) return;
  if(e.key==='ArrowRight') goTo(current+1);
  if(e.key==='ArrowLeft') goTo(current-1);
});
renderPage(0);

function showCover(){
  document.getElementById('bookWrap').classList.remove('show');
  document.getElementById('coverWrap').classList.remove('hidden');
  document.getElementById('toCoverBtn').classList.remove('show');
  current = 0;
  renderPage(0);
}

const subOverlay = document.getElementById('subOverlay');

function fieldHTML(f){
  if(f.type==='textarea'){
    return `<div class="field"><label>${f.label}</label><textarea id="f_${f.id}" placeholder="${f.placeholder||''}"></textarea></div>`;
  }
  return `<div class="field"><label>${f.label}</label><input id="f_${f.id}" type="${f.type}" placeholder="${f.placeholder||''}"></div>`;
}

function openSub(key){
  subOverlay.dataset.key = key;
  if(key==='profile'){
    subOverlay.innerHTML = `
      <div class="sub-head"><h3>Capability Profile</h3><button class="sub-close" onclick="closeSub()">✕</button></div>
      <div class="sub-content">
        <div class="sub-body">
          <div class="p-eyebrow">Included in this profile</div>
          <div class="profile-check"><span>Factory overview &amp; specs</span><span>✓</span></div>
          <div class="profile-check"><span>Certifications</span><span>✓</span></div>
          <div class="profile-check"><span>Trust &amp; compliance metrics</span><span>✓</span></div>
          <div class="profile-check"><span>Contact details</span><span>✓</span></div>
        </div>
        <div class="sub-foot">
          <button class="open-btn full-btn" onclick="downloadProfile()">Download PDF ↓</button>
        </div>
      </div>`;
  } else {
    const cfg = subPages[key];
    subOverlay.innerHTML = `
      <div class="sub-head"><h3>${cfg.title}</h3><button class="sub-close" onclick="closeSub()">✕</button></div>
      <div class="sub-content">
        <form id="subForm">
          <div class="sub-body">${cfg.fields.map(fieldHTML).join('')}</div>
          <div class="sub-foot"><button type="submit" class="open-btn full-btn">Submit →</button></div>
        </form>
      </div>`;
    document.getElementById('subForm').addEventListener('submit',(e)=>{
      e.preventDefault();
      submitSub(key,cfg);
    });
  }
  subOverlay.classList.add('open');
}
function closeSub(){
  subOverlay.classList.remove('open');
}
function submitSub(key,cfg){
  const ref = cfg.refPrefix+'-'+Date.now().toString().slice(-6);
  const content = subOverlay.querySelector('.sub-content');
  content.innerHTML = `
    <div class="stamp-confirm">
      <div class="stamp-mark"><span>${cfg.confirmTitle}</span></div>
      <div class="stamp-ref">REF ${ref}</div>
      <div class="stamp-msg">${cfg.confirmMsg}</div>
      <button class="nav-btn" style="margin-top:1.6rem;" onclick="closeSub()">Done</button>
    </div>`;
}

function downloadProfile(){
  try{
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF();
    let y = 22;
    doc.setFont('helvetica','bold'); doc.setFontSize(18);
    doc.text('Meridian Knitwear Ltd.',20,y); y+=8;
    doc.setFont('helvetica','normal'); doc.setFontSize(11);
    doc.text('Capability Profile — Bangladesh Apparel Passport',20,y); y+=6;
    doc.setDrawColor(150); doc.line(20,y,190,y); y+=10;

    const rows = [
      ['Location','Gazipur, Bangladesh'],
      ['Capacity','1.2M pcs / month'],
      ['Lead Time','45–60 days'],
      ['Export Markets','EU, UK, North America'],
      ['Certifications', certs.join(', ')]
    ];
    doc.setFontSize(12); doc.setFont('helvetica','bold'); doc.text('Factory Overview',20,y); y+=8;
    doc.setFontSize(10.5);
    rows.forEach(r=>{
      doc.setFont('helvetica','bold'); doc.text(r[0]+':',20,y);
      doc.setFont('helvetica','normal'); doc.text(String(r[1]),68,y,{maxWidth:120});
      y+=8;
    });

    y+=6; doc.setFontSize(12); doc.setFont('helvetica','bold'); doc.text('Trust & Compliance',20,y); y+=8;
    doc.setFontSize(10.5); doc.setFont('helvetica','normal');
    trustMetrics.forEach(t=>{ doc.text(t.label+': '+t.value+'%',20,y); y+=7; });

    y+=6; doc.setFontSize(12); doc.setFont('helvetica','bold'); doc.text('Contact',20,y); y+=8;
    doc.setFontSize(10.5); doc.setFont('helvetica','normal');
    doc.text('Tanvir Ahmed, Merchandiser',20,y); y+=7;
    doc.text('trade@meridianknit.example',20,y); y+=7;
    doc.text('Response time: under 24 hours',20,y);

    doc.save('Meridian-Knitwear-Capability-Profile.pdf');
  }catch(err){
    alert('The PDF generator could not load. Check your internet connection and try again.');
  }
}
document.addEventListener('keydown',(e)=>{ if(e.key==='Escape') closeSub(); });
